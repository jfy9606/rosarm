# ROS日志配置文件
# 设置默认日志级别为WARN，减少INFO级别的输出
log4j.logger.ros=WARN
log4j.logger.ros.roscpp=WARN
log4j.logger.ros.roscpp.superdebug=WARN

# 特定节点的日志级别
log4j.logger.ros.stereo_camera_node=WARN
log4j.logger.ros.arm_gui_node=WARN
log4j.logger.ros.servo_wrist=ERROR
log4j.logger.ros.yolo_detector=ERROR

# 自定义日志过滤器，屏蔽特定日志模式
log4j.logger.ros.stereo_camera_node.success=ERROR
log4j.appender.stdout.filter.1=org.apache.log4j.varia.StringMatchFilter
log4j.appender.stdout.filter.1.StringToMatch=成功接收到立体合并图像
log4j.appender.stdout.filter.1.AcceptOnMatch=false

# 降低ROS内部消息的日志级别
log4j.logger.ros.roscpp.internal=ERROR
log4j.logger.ros.tf=ERROR
log4j.logger.ros.topic_tools=ERROR 